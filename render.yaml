services:
  - type: web
    name: inventory-management
    runtime: python
    runtimeVersion: 3.11.9
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && gunicorn app.main:app --bind 0.0.0.0:8000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        value: sqlite:///./inventory_dev.db
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
